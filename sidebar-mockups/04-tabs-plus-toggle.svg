<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, system-ui, sans-serif" font-size="11">
  <defs>
    <style>
      .frame { fill: #fafafa; stroke: #888; stroke-width: 1; }
      .chrome { fill: #ececec; stroke: #888; stroke-width: 1; }
      .panel { fill: #ffffff; stroke: #ccc; stroke-width: 1; }
      .active-tab { fill: #ffffff; stroke: #888; stroke-width: 1; }
      .inactive-tab { fill: #d8d8d8; stroke: #888; stroke-width: 1; }
      .splitter { fill: #d4d4d4; }
      .content { fill: #ffffff; stroke: #ccc; stroke-width: 1; }
      .overlay { fill: #ffffff; stroke: #888; stroke-width: 1; }
      .overlay-hdr { fill: #efefef; stroke: #ccc; stroke-width: 1; }
      .text-line { stroke: #555; stroke-width: 1.5; stroke-linecap: round; }
      .label { fill: #222; font-weight: 600; }
      .muted { fill: #777; font-size: 10px; }
      .accent { fill: #0067c0; font-weight: 600; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect class="frame" x="10" y="10" width="780" height="480" rx="6"/>
  <rect class="chrome" x="10" y="10" width="780" height="28" rx="6"/>
  <text class="label" x="22" y="28">MarkdownViewer — option 4: keep tabs, add a pin-outline toggle</text>

  <text class="muted" x="270" y="56">sample / welcome.md</text>

  <!-- sidebar (tabbed, same as today) -->
  <rect class="panel" x="10" y="38" width="240" height="452"/>
  <rect class="active-tab" x="14" y="44" width="68" height="22"/>
  <text class="label" x="28" y="60">Folder</text>
  <rect class="inactive-tab" x="84" y="44" width="68" height="22"/>
  <text class="muted" x="98" y="60" font-size="11">Outline</text>

  <text class="muted" x="20" y="88">📁 sample</text>
  <text class="muted" x="36" y="106">📄 welcome.md</text>
  <text class="muted" x="36" y="124">📄 cheatsheet.md</text>
  <text class="muted" x="36" y="142">📄 notes.md</text>
  <text class="muted" x="36" y="160">📁 subfolder</text>
  <text class="muted" x="52" y="178">📄 deep.md</text>
  <text class="muted" x="36" y="196">📄 report.html</text>
  <text class="muted" x="36" y="214">📄 report.pdf</text>

  <rect class="chrome" x="14" y="456" width="232" height="30" rx="3"/>
  <text class="muted" x="22" y="474">📁 Open ▾</text>
  <text class="muted" x="226" y="474" text-anchor="end">⚙</text>

  <rect class="splitter" x="250" y="38" width="4" height="452"/>

  <!-- content -->
  <rect class="content" x="254" y="38" width="536" height="452"/>
  <line class="text-line" x1="290" y1="78" x2="500" y2="78"/>
  <line class="text-line" x1="290" y1="98" x2="740" y2="98"/>
  <line class="text-line" x1="290" y1="118" x2="730" y2="118"/>
  <line class="text-line" x1="290" y1="138" x2="680" y2="138"/>
  <line class="text-line" x1="290" y1="170" x2="540" y2="170"/>
  <line class="text-line" x1="290" y1="190" x2="730" y2="190"/>
  <line class="text-line" x1="290" y1="210" x2="710" y2="210"/>
  <line class="text-line" x1="290" y1="230" x2="640" y2="230"/>

  <!-- floating outline pinned to top-right of content -->
  <g filter="url(#shadow)">
    <rect class="overlay" x="580" y="74" width="200" height="280" rx="6"/>
    <rect class="overlay-hdr" x="580" y="74" width="200" height="22" rx="6"/>
    <text class="label" x="592" y="89" font-size="10">OUTLINE</text>
    <text class="muted" x="762" y="89" text-anchor="end" font-size="11">📌</text>
    <text class="accent" x="592" y="114">H1 Welcome</text>
    <text class="muted" x="608" y="132">H2 Headings…</text>
    <text class="muted" x="608" y="150">H2 Lists</text>
    <text class="muted" x="624" y="168">H3 Task list</text>
    <text class="muted" x="608" y="186">H2 Code</text>
    <text class="muted" x="608" y="204">H2 Tables</text>
    <text class="muted" x="608" y="222">H2 Mermaid</text>
    <text class="muted" x="608" y="240">H2 Footnotes</text>
    <text class="muted" x="608" y="258">H2 Horizontal rule</text>
  </g>

  <text class="muted" x="400" y="478" text-anchor="middle">
    Tabs stay; outline can be pinned as a floating overlay (toggle button or shortcut).
  </text>
</svg>
